services:
  api:
    build: .
    container_name: nest-ecommerce-api
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/nestdb?schema=public
      - JWT_SECRET=your-super-secret-key
      - JWT_EXPIRES_IN=1d
    depends_on:
      db:
        condition: service_healthy
    restart: always

  db:
    image: postgres:16-alpine
    container_name: nest-ecommerce-db
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=nestdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d nestdb"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
